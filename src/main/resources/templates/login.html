<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            margin-top: 70px;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #245c6c; /* Güncellenen renk */
            color: #fff;
            border-radius: 10px 10px 0 0;
        }
        .form-control:focus {
            border-color: #245c6c; /* Güncellenen renk */
            box-shadow: none;
        }
        .btn-primary {
            background-color: #245c6c; /* Güncellenen renk */
            border: none;
            border-radius: 20px;
        }
        .btn-primary:hover {
            background-color: #1a4753; /* Renk tonunu biraz koyulaştırdım */
        }
        .footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            background-color: #ffffff;
            color: white;
            text-align: center;
            padding: 10px 0; /* Footer içeriği için padding */
        }
    </style>
</head>
<div th:replace="navbar.html"></div>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4 login-container">
            <div class="card">
                <div class="card-header text-center">
                    <h3>Sisteme Giriş Yapınız</h3>
                </div>
                <div class="card-body">
                    <img src="/5.svg" alt="Login Image" class="img-fluid mb-4">
                    <form action="" method="POST">
                        <div class="form-group">
                            <label for="username">Kullanıcı Adı:</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Şifre:</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Giriş Yap</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
